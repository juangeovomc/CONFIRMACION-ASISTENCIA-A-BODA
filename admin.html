<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel RSVP - Boda Sebas &amp; Marce</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <main class="main">
        <section class="section">
          <div class="section-header">
            <h2>Panel de confirmaciones</h2>
            <p>
              Verde: Sí asisten · Rojo: No asisten · Amarillo: Pendiente / Tal vez
            </p>
          </div>

          <div class="card">
            <div id="authView" class="p-4">
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label for="adminEmail" class="form-label">Correo</label>
                  <input
                    type="email"
                    id="adminEmail"
                    class="form-control"
                    autocomplete="username"
                  />
                </div>
                <div class="col-12 col-md-6">
                  <label for="adminPassword" class="form-label">Contraseña</label>
                  <input
                    type="password"
                    id="adminPassword"
                    class="form-control"
                    autocomplete="current-password"
                  />
                </div>
                <div class="col-12 d-flex gap-2">
                  <button id="loginBtn" class="btn btn-primary" type="button">
                    Iniciar sesión
                  </button>
                  <div id="authMsg" class="align-self-center"></div>
                </div>
              </div>
            </div>

            <div id="adminView" class="p-4" style="display: none">
              <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
                <div class="d-flex flex-wrap gap-2 align-items-center">
                  <input
                    id="searchInput"
                    type="text"
                    class="form-control"
                    style="max-width: 320px"
                    placeholder="Buscar invitación o persona"
                  />
                  <button id="refreshBtn" class="btn btn-outline-primary" type="button">
                    Actualizar
                  </button>
                </div>
                <button id="logoutBtn" class="btn btn-outline-secondary" type="button">
                  Cerrar sesión
                </button>
              </div>

              <div class="table-responsive">
                <table class="table table-hover align-middle">
                  <thead>
                    <tr>
                      <th>Invitación</th>
                      <th>Estado</th>
                      <th>WhatsApp</th>
                      <th>Personas</th>
                      <th>Última actualización</th>
                    </tr>
                  </thead>
                  <tbody id="rsvpTableBody"></tbody>
                </table>
              </div>

              <div id="adminMsg" class="mt-2"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="invitados.js"></script>
    <script src="admin.js"></script>
  </body>
</html>
